<head>
  <!-- STYLING -->
  {{ $opts := dict "noMap" true -}}
  {{ with resources.Get "css/style.css" | postCSS $opts -}}
  <link rel="stylesheet" href="{{ .RelPermalink }}">
  {{ end -}}
  <!-- FAV ICON -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="manifest" href="/manifest.json">
  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="/fontawesome/css/fontawesome.min.css">
  <link rel="stylesheet" href="/fontawesome/css/solid.min.css">
  <link rel="stylesheet" href="/fontawesome/css/thin.min.css">
  <link rel="stylesheet" href="/fontawesome/css/brands.min.css">
  <link rel="stylesheet" href="/fontawesome/css/duotone.min.css">
  <!-- PAGE DATA -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ default .Site.Title .Title }}</title>
  <meta name="description" content="{{ default .Site.Params.description .Params.description }}">
  {{ $keywords := .Site.Params.keywords }}
  {{ if .Params.tags }}
  {{ $keywords = $keywords | append .Params.tags }}
  {{ end }}
  <meta name="keywords" content="{{ delimit $keywords " , " }}">
  <meta name="author" content="{{ default .Site.Params.author .Params.author }}">
  <!-- ANALYTICS -->
  {{ partial "analytics.html" . }}
</head>
