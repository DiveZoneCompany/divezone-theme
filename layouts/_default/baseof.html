<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
  {{ partial "head.html" . }}
  <body>
    <div class="page-layout">
      {{ partial "header.html" . }}
      {{ partial "nav.html" . }}
      <main {{ if .Draft }}draft{{ end }}
        class="main--{{ .Type }} main--{{ .File.ContentBaseName | default "home" }}">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </body>
</html>
